name: Gemini JSON Gate

on:
  push:
    paths:
      - ".github/workflows/gemini-json-gate.yml"
      - "CMakeLists.txt"
      - "include/**"
      - "modules/gemini-json/**"
  pull_request:
    paths:
      - ".github/workflows/gemini-json-gate.yml"
      - "CMakeLists.txt"
      - "include/**"
      - "modules/gemini-json/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gemini-json-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            cmake \
            g++ \
            libgtest-dev \
            ninja-build \
            redis-server \
            tcl

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build Gemini JSON module
        run: cmake --build build --parallel 2 --target redis_json

      - name: Build JSON value tests
        run: cmake --build build --parallel 2 --target json_value_test

      - name: Build JSON parser tests
        run: cmake --build build --parallel 2 --target json_parse_test

      - name: Build JSONPath tests
        run: cmake --build build --parallel 2 --target json_path_test

      - name: Build JSON safety tests
        run: cmake --build build --parallel 2 --target json_asan_test

      - name: Build JSON persistence tests
        run: cmake --build build --parallel 2 --target json_rdb_test

      - name: Run JSON value tests
        run: ./build/modules/gemini-json/json_value_test --gtest_color=yes

      - name: Run JSON parser tests
        run: ./build/modules/gemini-json/json_parse_test --gtest_color=yes

      - name: Run JSONPath tests
        run: ./build/modules/gemini-json/json_path_test --gtest_color=yes

      - name: Run JSON safety tests
        run: ./build/modules/gemini-json/json_asan_test --gtest_color=yes

      - name: Run JSON persistence tests
        run: ./build/modules/gemini-json/json_rdb_test --gtest_color=yes

      - name: Run Redis integration tests
        run: tclsh modules/gemini-json/tests/tcl/json_test.tcl ./build/redis_json.so
